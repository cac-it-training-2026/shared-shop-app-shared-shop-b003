<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">
<head>
	<title>提案結果 | スマート購入プランナー | [[#{shop.title}]]</title>
	<meta charset="UTF-8" />
</head>
<body class="user">
	<h2 class="title">おすすめの商品セット</h2>
	<div class="info_form_area">
		<p>入力された用途: <strong th:text="${purpose}"></strong> / 予算: <strong th:text="${#numbers.formatInteger(budget, 1, 'COMMA')} + '円'"></strong></p>

		<div th:if="${#maps.isEmpty(plans)}">
			<p>申し訳ありません。ご希望の条件に合う商品セットが見つかりませんでした。</p>
			<p>有効なキーワード（ゲーム、食料品、書籍など）を入力してください。</p>
		</div>

		<div th:each="entry : ${plans}" class="item_set" style="margin-bottom: 40px; border: 2px solid #555; padding: 20px; border-radius: 10px; background-color: #fcfcfc;">
			<h3 th:text="${entry.key}" style="border-bottom: 1px solid #777; padding-bottom: 5px; margin-bottom: 15px; color: #333;"></h3>
			<table class="list_table">
				<thead>
					<tr>
						<th>画像</th>
						<th>商品名</th>
						<th>カテゴリ</th>
						<th>価格</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="item : ${entry.value}">
						<td>
							<img th:src="${item.imageUrl}" th:if="${item.imageUrl != null}" style="max-width: 80px; max-height: 80px;"/>
							<img th:src="@{/images/{image}(image=${item.image})}" th:if="${item.imageUrl == null and item.image != null}" style="max-width: 80px; max-height: 80px;"/>
							<img th:src="@{/images/common/no_image.jpg}" th:if="${item.imageUrl == null and item.image == null}" style="max-width: 80px; max-height: 80px;"/>
						</td>
						<td><a th:href="@{/client/item/detail/{id}(id=${item.id})}" th:text="${item.name}"></a></td>
						<td th:text="${item.category.name}"></td>
						<td th:text="${#numbers.formatInteger(item.price, 1, 'COMMA')} + '円'"></td>
					</tr>
				</tbody>
				<tfoot>
					<tr th:with="total=${#aggregates.sum(entry.value.![price])}">
						<th colspan="3" style="text-align: right;">合計金額</th>
						<th th:text="${#numbers.formatInteger(total, 1, 'COMMA')} + '円'"></th>
					</tr>
					<tr th:with="total=${#aggregates.sum(entry.value.![price])}">
						<th colspan="3" style="text-align: right; color: #d9534f;">残予算</th>
						<th th:text="${#numbers.formatInteger(budget - total, 1, 'COMMA')} + '円'" style="color: #d9534f;"></th>
					</tr>
				</tfoot>
			</table>
		</div>

		<div class="detail_button_area">
			<form th:action="@{/client/planner/input}" method="get">
				<input type="submit" value="戻る" class="back_button" />
			</form>
		</div>
	</div>
</body>
</html>
