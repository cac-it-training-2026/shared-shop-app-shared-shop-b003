<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">
<head>
    <title th:text="#{planner} + ' | ' + #{shop.title}"></title>
    <meta charset="UTF-8" />
</head>
<body class="user planner_input">
    <h2 class="title" th:text="#{planner}"></h2>
    <p th:text="用途と予算を入力してください。"></p>

    <form th:action="@{/client/planner/result}" th:object="${smartPlannerForm}" method="post" class="list_table">
        <ul th:if="${#fields.hasErrors('*')}" class="error_list">
            <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
        </ul>

        <table class="detail_table">
            <tr>
                <th>用途（自由入力）</th>
                <td>
                    <input type="text" th:field="*{useCase}" placeholder="例: ゲームをしたい、プログラミングを学びたい" size="50"/>
                    <span th:if="${#fields.hasErrors('useCase')}" th:errors="*{useCase}" class="error"></span>
                </td>
            </tr>
            <tr>
                <th>予算（上限）</th>
                <td>
                    <select th:field="*{budget}">
                        <option value="1000">～1,000円</option>
                        <option value="3000">～3,000円</option>
                        <option value="5000">～5,000円</option>
                        <option value="10000">～10,000円</option>
                        <option value="20000">～20,000円</option>
                        <option value="30000">～30,000円</option>
                        <option value="50000">～50,000円</option>
                        <option value="100000" selected>～100,000円</option>
                        <option value="150000">～150,000円</option>
                        <option value="200000">～200,000円</option>
                        <option value="9999999">200,000円以上</option>
                    </select>
                    <span th:if="${#fields.hasErrors('budget')}" th:errors="*{budget}" class="error"></span>
                </td>
            </tr>
        </table>
        <div class="btn_area">
            <input type="submit" value="提案を表示する" class="btn_submit"/>
        </div>
    </form>
</body>
</html>
