<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">
<head>
<title>スマート購入プランナー | [[#{shop.title}]]</title>
</head>
<body class="user">
	<h2 class="page_title">スマート購入プランナー</h2>
	<div class="user_info_form_area">
		<p>用途と予算に合わせて、おすすめの商品セットをご提案します。</p>
		<form th:action="@{/client/planner/result}" method="post" th:object="${plannerForm}">
			<ul class="error_list" th:if="${#fields.hasErrors('*')}">
				<li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
			</ul>
			<table class="detail_table">
				<tr>
					<th>用途</th>
					<td>
						<select th:field="*{purpose}">
							<option value="1">パーティー</option>
							<option value="2">自分へのご褒美</option>
							<option value="3">日常</option>
						</select>
					</td>
				</tr>
				<tr>
					<th>予算 (円)</th>
					<td><input type="number" th:field="*{budget}" step="100" /></td>
				</tr>
			</table>
			<div class="detail_button_area">
				<input type="submit" value="プランを提案してもらう" class="send_button" />
				<input type="button" value="戻る" class="back_button" onclick="history.back()" />
			</div>
		</form>
	</div>
</body>
</html>
