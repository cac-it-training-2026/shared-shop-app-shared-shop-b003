<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">
<head>
    <title th:text="#{planner} + '結果 | ' + #{shop.title}"></title>
    <meta charset="UTF-8" />
</head>
<body class="user planner_result">
    <h2 class="title" th:text="#{planner} + '結果'"></h2>

    <div class="search_condition">
        <p>入力された用途: <span th:text="${useCase}"></span></p>
        <p>予算:
            <span th:if="${budget < 9999999}" th:text="${budget} + '円以内'"></span>
            <span th:if="${budget >= 9999999}">200,000円以上</span>
        </p>
    </div>

    <div th:if="${#lists.isEmpty(recommendedSets)}">
        <p>条件に合うおすすめセットが見つかりませんでした。用途や予算を変更して再度お試しください。</p>
    </div>

    <div th:each="set, status : ${recommendedSets}" class="recommended_set">
        <h3 th:text="'おすすめセット ' + ${status.count}"></h3>
        <p>おすすめ理由: <span th:text="${set.reason}"></span></p>

        <table class="list_table item_detail">
            <tr>
                <th th:text="#{data.item.image}"></th>
                <th th:text="#{data.item.name}"></th>
                <th th:text="#{data.item.price}"></th>
                <th th:text="#{category}"></th>
            </tr>
            <tr th:each="item : ${set.items}">
                <td class="image">
                    <img th:src="@{/images/{image}(image=${item.image})}" th:if="${item.image != null}" />
                    <img th:src="@{/images/common/no_image.jpg}" th:if="${item.image == null}" />
                </td>
                <td><a th:href="@{/client/item/detail/{id}(id=${item.id})}" th:text="${item.name}"></a></td>
                <td th:text="${item.price} + '円'"></td>
                <td th:text="${item.categoryName}"></td>
            </tr>
            <tr class="total_row">
                <td colspan="2" class="total_label">合計金額</td>
                <td colspan="2" class="total_price" th:text="${set.totalPrice} + '円'"></td>
            </tr>
        </table>

        <div class="btn_area">
            <!-- 一括カート追加は複雑なため、ここでは詳細へのリンクを優先 -->
            <a th:href="@{/client/planner/input}" class="btn_back">戻る</a>
        </div>
        <hr/>
    </div>

</body>
</html>
