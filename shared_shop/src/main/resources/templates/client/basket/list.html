<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{basket} + #{title.list} + ' | ' + #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body class="user basket_list">
	<h2 th:class="title" th:text="#{basket} + #{title.list}"></h2>

	<p th:if="${#lists.isEmpty(session.basketBeans)}" th:text="#{msg.basket.list.none}"></p>

	<th:block th:if="${itemNameListZero != null}">
		<ul class="error_list_no_mark">
			<li th:each="err : ${itemNameListZero}" th:text="#{msg.basket.stock.none(${err})}"></li>
		</ul>
	</th:block>

	<th:block th:if="${itemNameListLessThan != null}">
		<ul class="error_list_no_mark">
			<li th:each="err : ${itemNameListLessThan}" th:text="#{msg.basket.stock.short(${err})}"></li>
		</ul>
	</th:block>

	<div th:unless="${#lists.isEmpty(session.basketBeans)}">
		<table class="list_table">
			<tr>
				<th>[[#{data.basket.item.name}]]</th>
				<th>[[#{data.unit.price}]]</th>
				<th>[[#{data.basket.count}]]</th>
				<th>[[#{data.basket.operate}]]</th>
				<th>[[#{data.basket.stock.status}]]</th>
			</tr>
			<tr th:each="item: ${session.basketBeans}">
				<td th:text="${item.name}"></td>
				<td th:text="${item.price}"></td>
				<td th:text="${item.orderNum}"></td>
				<td>
					<form th:action="@{/client/basket/delete}" method="post">
						<input type="hidden" name="id" th:value="${item.id}" />
						<input type="submit" value="削除" />
					</form>
				</td>
				<td th:if="${item.stock == 0}" th:text="#{data.out.of.stock}"></td>
				<td th:if="${item.stock >= 6}" th:text="#{data.in.stock}"></td>
				<td th:if="${item.stock >= 1 and 5 >= item.stock }" th:text="${item.stock}"></td>
			</tr>
		</table>

		<div class="coupon_area" style="margin-top: 20px; border: 1px solid #ccc; padding: 10px;">
			<h3>クーポン利用</h3>
			<p th:if="${couponError != null}" style="color: red;" th:text="${couponError}"></p>
			<form th:action="@{/client/basket/applyCoupon}" method="post">
				クーポンコード: <input type="text" name="code" th:value="${session.coupon != null ? session.coupon.code : ''}" />
				<input type="submit" value="適用" />
			</form>
			<div th:if="${session.coupon != null}" style="margin-top: 10px;">
				<p>適用中のクーポン: <span th:text="${session.coupon.code}"></span></p>
				<p>割引額: <span th:text="${discount}"></span>円</p>
			</div>
		</div>

		<div class="total_area" style="margin-top: 20px; text-align: right;">
			<p>合計金額: <span th:text="${total}"></span>円</p>
			<div th:if="${session.coupon != null}">
				<p>割引適用後合計: <span style="font-size: 1.5em; color: red;" th:text="${discountedTotal}"></span>円</p>
			</div>
		</div>

		<div class="user_info_form_area shopping_button">
			<!--/* 注文手続きフォーム */-->
			<form th:action="@{/client/order/address/input}" method="post">
				<input type="submit" value="注文手続きへ" />
			</form>
			<!--/* 買い物かごを空にするフォーム */-->
			<form th:action="@{/client/basket/allDelete}" method="post">
				<input type="submit" value="買い物かごを空にする" />
			</form>
		</div>
	</div>
</body>

</html>
