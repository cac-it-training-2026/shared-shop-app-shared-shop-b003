<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{order}+#{title.list}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body class="user order_list">
	<h2 th:class="title" th:text="#{order}+#{title.list}"></h2>
	<div th:if="${orders == null}">
		<p class="list_none">[[#{msg.order.list.none}]]</p>
		<p class="complete_link"><a th:href="@{/}" th:text="#{msg.back.to.top}"></a></p>
	</div>

	<table class="list_table order" th:if="${orders != null}">
		<tr>
			<th>[[#{data.client.order.date}]]</th>
			<th>[[#{paymethod.str}]]</th>
			<th>[[#{data.total.price}]]</th>
			<th>利用ポイント</th>
			<th>[[#{data.operate}]]</th>
		</tr>
		<tr th:each="order: ${orders}">
			<td th:text="${order.insertDate}"></td>
			<td th:switch="${order.payMethod}">
				<span th:case="1">[[#{paymethod.credit.str}]]</span>
				<span th:case="2">[[#{paymethod.bank.str}]]</span>
				<span th:case="3">[[#{paymethod.onarrival.str}]]</span>
				<span th:case="4">[[#{paymethod.emoney.str}]]</span>
				<span th:case="5">[[#{paymethod.convenience.str}]]</span>
			</td>
			<td th:text="${order.discountedTotal - order.usedPoint}" class="text"></td>
			<td th:text="${order.usedPoint} + 'pt'"></td>
			<td>
				<form th:action="@{/client/order/detail/{id}(id=${order.id})}" method="post">
					<input type="submit" value="詳細" />
				</form>
			</td>
		</tr>
	</table>

</body>

</html>
