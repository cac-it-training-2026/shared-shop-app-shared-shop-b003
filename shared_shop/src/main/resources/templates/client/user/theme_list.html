<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title>着せ替え設定 | [[#{shop.title}]]</title>
	<meta charset="UTF-8" />
</head>

<body class="user theme_list">
	<h2 class="title">着せ替え設定</h2>

	<div class="user_stats">
		<p>現在の購入状況： 購入回数 [[${purchaseCount}]]回 / 累計購入金額 [[${#numbers.formatInteger(totalPurchaseAmount, 1, 'COMMA')}]]円</p>
	</div>

	<div class="theme_container">
		<table class="list_table">
			<thead>
				<tr>
					<th>テーマ名</th>
					<th>解放条件</th>
					<th>操作</th>
				</tr>
			</thead>
			<tbody>
				<!-- 通常テーマ -->
				<tr>
					<td>通常テーマ</td>
					<td>初期状態</td>
					<td>
						<form th:action="@{/client/theme/change}" method="post">
							<input type="hidden" name="themeId" value="0" />
							<input type="submit" value="適用" th:disabled="${currentThemeId == 0}" />
						</form>
					</td>
				</tr>
				<!-- さくらテーマ -->
				<tr>
					<td>さくらテーマ</td>
					<td>購入回数1回以上</td>
					<td>
						<form th:action="@{/client/theme/change}" method="post">
							<input type="hidden" name="themeId" value="1" />
							<input type="submit" value="適用" th:disabled="${currentThemeId == 1 || purchaseCount < 1}" />
						</form>
					</td>
				</tr>
				<!-- 海テーマ -->
				<tr>
					<td>海テーマ</td>
					<td>購入回数3回以上</td>
					<td>
						<form th:action="@{/client/theme/change}" method="post">
							<input type="hidden" name="themeId" value="2" />
							<input type="submit" value="適用" th:disabled="${currentThemeId == 2 || purchaseCount < 3}" />
						</form>
					</td>
				</tr>
				<!-- ゲームテーマ -->
				<tr>
					<td>ゲームテーマ</td>
					<td>購入回数5回以上</td>
					<td>
						<form th:action="@{/client/theme/change}" method="post">
							<input type="hidden" name="themeId" value="3" />
							<input type="submit" value="適用" th:disabled="${currentThemeId == 3 || purchaseCount < 5}" />
						</form>
					</td>
				</tr>
				<!-- 宇宙テーマ -->
				<tr>
					<td>宇宙テーマ</td>
					<td>累計購入金額10,000円以上</td>
					<td>
						<form th:action="@{/client/theme/change}" method="post">
							<input type="hidden" name="themeId" value="4" />
							<input type="submit" value="適用" th:disabled="${currentThemeId == 4 || totalPurchaseAmount < 10000}" />
						</form>
					</td>
				</tr>
				<!-- ゴールドテーマ -->
				<tr>
					<td>ゴールドテーマ</td>
					<td>購入回数10回以上</td>
					<td>
						<form th:action="@{/client/theme/change}" method="post">
							<input type="hidden" name="themeId" value="5" />
							<input type="submit" value="適用" th:disabled="${currentThemeId == 5 || purchaseCount < 10}" />
						</form>
					</td>
				</tr>
				<!-- P3techテーマ -->
				<tr>
					<td>P3techテーマ</td>
					<td>購入回数20回以上</td>
					<td>
						<form th:action="@{/client/theme/change}" method="post">
							<input type="hidden" name="themeId" value="6" />
							<input type="submit" value="適用" th:disabled="${currentThemeId == 6 || purchaseCount < 20}" />
						</form>
					</td>
				</tr>
			</tbody>
		</table>
	</div>

	<div class="detail_button_area">
		<form th:action="@{/client/user/detail}" method="get">
			<input type="submit" value="戻る" class="back_button" />
		</form>
	</div>
</body>

</html>
