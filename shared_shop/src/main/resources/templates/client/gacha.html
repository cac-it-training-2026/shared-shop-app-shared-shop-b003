<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">
<head>
    <title>ガチャ | シェアードショップ</title>
    <meta charset="UTF-8" />
</head>
<body class="user gacha">
    <h2 class="title" th:text="#{gacha.title}"></h2>

    <div class="gacha_area">
        <p th:text="#{gacha.ticket.count(${gachaCount})}"></p>

        <div th:if="${errorMessage}" class="error">
            <p th:text="${errorMessage}"></p>
        </div>

        <div th:if="${result}" class="result">
            <div th:if="${result.win}">
                <h3 th:text="#{gacha.win}"></h3>
                <p th:text="#{gacha.win.message}"></p>
                <p>[[#{gacha.result.code}]] <strong th:text="${result.coupon.code}"></strong></p>
                <p>[[#{gacha.result.discount}]] <span th:text="${result.coupon.discountValue}"></span>
                   <span th:text="${result.coupon.discountType == 'percent' ? '%' : '円'}"></span></p>
            </div>
            <div th:unless="${result.win}">
                <h3 th:text="#{gacha.lose}"></h3>
                <p th:text="#{gacha.lose.message}"></p>
            </div>
        </div>

        <form th:action="@{/client/gacha/play}" method="post" th:if="${gachaCount > 0}">
            <button type="submit" class="gacha_button" th:text="#{gacha.button}"></button>
        </form>
        <p th:if="${gachaCount == 0 and result == null}" th:text="#{gacha.no.ticket}"></p>
    </div>

    <div class="back_link">
        <a th:href="@{/}" th:text="#{msg.back.to.top}"></a>
    </div>
</body>
</html>
