<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{item}+#{title.detail}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body class="user">

	<h2 th:class="title" th:text="#{item}+#{title.detail}"></h2>

	<div class="info_form_area" th:object="${item}">
		<div class="item_detail_area">
			<div class="item_image_area">
				<img th:if="*{image != null}" th:src="@{/images/{image}(image=*{image})}"></img>
				<img th:if="*{image == null}" th:src="@{/images/common/no_image.jpg}"></img>
			</div>
			<dl class="item_detail_list">
				<dt>[[#{data.item.name}]]</dt>
				<dd th:text="*{name}"></dd>
				<dt>[[#{data.item.price}]]</dt>
				<dd th:text="*{price}"></dd>
				<dt>[[#{data.item.stock}]]</dt>
				<dd th:if="*{stock > 5}" th:text="#{data.in.stock}"></dd>
				<dd th:if="*{stock >= 1 and 5 >= stock }" th:text="*{stock}"></dd>
				<dd th:if="*{stock == 0}" th:text="#{data.out.of.stock}"></dd>
				<dt>[[#{data.category}]]</dt>
				<dd th:text="*{categoryName}"></dd>
				<dt>[[#{data.description}]]</dt>
				<dd th:text="*{description}"></dd>
			</dl>
		</div>
		<div class="detail_button_area">
			<form th:action="@{/client/basket/add}" method="post" class="user_info_form" th:if="*{stock > 0}">
				<input type="hidden" th:field="*{id}" />
				<input type="submit" value="買い物かごに入れる" class="send_button" />
			</form>
			<form th:action="@{/client/item/list/1}" method="post">
				<input type="submit" value="戻る" class="back_button" />
			</form>
		</div>

		<hr style="margin: 30px 0;"/>
		<h2 th:class="title">商品レビュー</h2>

		<!-- レビュー一覧 -->
		<div class="review_list_area" style="margin-bottom: 20px;">
			<div th:if="${#lists.isEmpty(reviews)}">
				<p>まだレビューはありません。</p>
			</div>
			<div th:each="review : ${reviews}" style="border: 1px solid #ccc; padding: 10px; margin-bottom: 10px;">
				<div style="font-weight: bold; margin-bottom: 5px;">
					評価: <span th:text="${review.rating}"></span> / 5
					<span style="font-size: 0.8em; color: #666; margin-left: 10px;" th:text="${#dates.format(review.createdTime, 'yyyy/MM/dd HH:mm')}"></span>
				</div>
				<p th:text="${review.commentText}" style="margin: 0;"></p>
			</div>
		</div>

		<!-- レビュー投稿フォーム (ログインユーザーのみ表示) -->
		<div class="review_form_area" th:if="${session.user != null}">
			<h3 th:class="title" style="font-size: 1.2em;">レビューを投稿する</h3>
			<form th:action="@{/client/item/review}" method="post">
				<input type="hidden" name="productId" th:value="${item.id}" />
				<div style="margin-bottom: 10px;">
					<label for="rating">評価 (1-5): </label>
					<select name="rating" id="rating">
						<option value="5">5 (最高)</option>
						<option value="4">4</option>
						<option value="3">3</option>
						<option value="2">2</option>
						<option value="1">1 (最低)</option>
					</select>
				</div>
				<div style="margin-bottom: 10px;">
					<label for="commentText" style="display:block;">コメント:</label>
					<textarea name="commentText" id="commentText" rows="4" cols="50" maxlength="500"></textarea>
				</div>
				<input type="submit" value="投稿する" class="send_button" />
			</form>
		</div>
		<div th:if="${session.user == null}">
			<p>レビューを投稿するには<a th:href="@{/login}">ログイン</a>してください。</p>
		</div>
	</div>

</body>

</html>
