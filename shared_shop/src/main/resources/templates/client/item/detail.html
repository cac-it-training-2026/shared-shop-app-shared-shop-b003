<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{item}+#{title.detail}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body class="user">

	<h2 th:class="title" th:text="#{item}+#{title.detail}"></h2>

	<div class="info_form_area" th:object="${item}">
		<div class="item_detail_area">
			<div class="item_image_area">
				<img th:if="*{image != null}" th:src="@{/images/{image}(image=*{image})}"></img>
				<img th:if="*{image == null}" th:src="@{/images/common/no_image.jpg}"></img>
			</div>
			<dl class="item_detail_list">
				<dt>[[#{data.item.name}]]</dt>
				<dd th:text="*{name}"></dd>
				<dt>[[#{data.item.price}]]</dt>
				<dd th:text="*{price}"></dd>
				<dt>[[#{data.item.stock}]]</dt>
				<dd th:if="*{stock > 5}" th:text="#{data.in.stock}"></dd>
				<dd th:if="*{stock >= 1 and 5 >= stock }" th:text="*{stock}"></dd>
				<dd th:if="*{stock == 0}" th:text="#{data.out.of.stock}"></dd>
				<dt>[[#{data.category}]]</dt>
				<dd th:text="*{categoryName}"></dd>
				<dt>[[#{data.description}]]</dt>
				<dd th:text="*{description}"></dd>
			</dl>
		</div>
		<div class="detail_button_area">
			<form th:action="@{/client/basket/add}" method="post" class="user_info_form" th:if="*{stock > 0}">
				<input type="hidden" th:field="*{id}" />
				<input type="submit" value="買い物かごに入れる" class="send_button" />
			</form>
			<form th:action="@{/client/item/list/1}" method="post">
				<input type="submit" value="戻る" class="back_button" />
			</form>
		</div>

		<hr />

		<div class="review_area">
			<h3 th:text="#{review}"></h3>

			<!-- レビュー投稿フォーム -->
			<div th:if="${canReview}">
				<h4 th:text="#{title.input}"></h4>
				<form th:action="@{/client/review/regist}" method="post" th:object="${reviewForm}">
					<input type="hidden" th:field="*{itemId}" th:value="${item.id}" />
					<dl>
						<dt th:text="#{reviewForm.rating}"></dt>
						<dd>
							<select th:field="*{rating}">
								<option value="5">5</option>
								<option value="4">4</option>
								<option value="3">3</option>
								<option value="2">2</option>
								<option value="1">1</option>
							</select>
							<span th:errors="*{rating}" class="error_msg"></span>
						</dd>
						<dt th:text="#{reviewForm.stampId}"></dt>
						<dd>
							<div class="stamp_selection">
								<label th:each="stamp : ${stamps}" style="display: inline-block; margin-right: 10px; text-align: center;">
									<input type="radio" th:field="*{stampId}" th:value="${stamp.id}" />
									<br/>
									<img th:src="@{/images/{path}(path=${stamp.imagePath})}" th:alt="${stamp.name}" width="50" height="50" />
									<br/>
									<span th:text="${stamp.name}"></span>
								</label>
								<label style="display: inline-block; margin-right: 10px; text-align: center;">
									<input type="radio" th:field="*{stampId}" th:value="${null}" />
									<br/>
									<span>選択しない</span>
								</label>
							</div>
						</dd>
						<dt th:text="#{reviewForm.body}"></dt>
						<dd>
							<textarea th:field="*{body}" rows="4" cols="40"></textarea>
							<span th:errors="*{body}" class="error_msg"></span>
						</dd>
					</dl>
					<input type="submit" value="レビューを投稿する" class="send_button" />
				</form>
			</div>

			<!-- レビュー一覧 -->
			<div class="review_list">
				<h4 th:text="#{title.list}"></h4>
				<div th:if="${#lists.isEmpty(reviews)}">
					<p>レビューはまだありません。</p>
				</div>
				<div th:each="review : ${reviews}" class="review_item">
					<hr />
					<p>
						<span th:text="${#dates.format(review.insertDate, 'yyyy/MM/dd HH:mm:ss')}"></span>
						<span th:text="${review.user.name}"></span>
						<span>評価: <span th:text="${review.rating}"></span></span>
					</p>
					<div th:if="${review.stamp != null}">
						<img th:src="@{/images/{path}(path=${review.stamp.imagePath})}" th:alt="${review.stamp.name}" width="60" height="60" />
					</div>
					<p th:text="${review.body}"></p>
				</div>
			</div>
		</div>
	</div>

</body>

</html>
