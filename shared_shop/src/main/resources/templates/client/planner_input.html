<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title>スマート購入プランナー | [[#{shop.title}]]</title>
	<meta charset="UTF-8" />
</head>

<body class="user">
	<h2 class="title">スマート購入プランナー</h2>

	<div class="info_form_area">
		<p>用途と予算を入力してください。あなたに最適な商品セットを提案します。</p>
		<form th:action="@{/client/planner/results}" method="post">
			<ul class="input_list">
				<li>
					<label>利用目的：</label>
					<input type="text" name="purpose" required placeholder="例：ゲームをしたい、プログラミングを学びたい" style="width: 300px;"/>
				</li>
				<li>
					<label>予算（上限）：</label>
					<select name="budget">
						<option value="1000">〜1,000円</option>
						<option value="3000">〜3,000円</option>
						<option value="5000">〜5,000円</option>
						<option value="10000">〜10,000円</option>
						<option value="30000">〜30,000円</option>
						<option value="50000">〜50,000円</option>
						<option value="100000">〜100,000円</option>
						<option value="200000">〜200,000円</option>
						<option value="1000000">上限なし</option>
					</select>
				</li>
			</ul>
			<div class="detail_button_area">
				<input type="submit" value="提案を表示する" class="send_button" />
			</div>
		</form>
	</div>
</body>

</html>
