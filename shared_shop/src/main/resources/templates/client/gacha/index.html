<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{gacha.title} + ' | ' + #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body class="user gacha_index">
	<h2 th:class="title" th:text="#{gacha.title}"></h2>
	<div class="gacha_area" style="text-align: center; margin-top: 50px;">
		<p th:text="#{gacha.welcome}"></p>
		<div class="gacha_machine" style="margin: 30px 0;">
			<img th:src="@{/images/gacha_machine.png}" alt="Gacha Machine" style="width: 200px;" th:if="${false}"/>
			<!-- Placeholder for gacha image if not exists -->
			<div style="width: 200px; height: 200px; background-color: #f0f0f0; border: 2px solid #ccc; border-radius: 50%; margin: 0 auto; line-height: 200px; font-size: 50px;">🎰</div>
		</div>
		<form th:action="@{/client/gacha/spin}" method="post">
			<input type="submit" th:value="#{gacha.spin.button}" class="gacha_button" style="padding: 15px 30px; font-size: 20px; cursor: pointer; background-color: #ff4500; color: white; border: none; border-radius: 5px;" />
		</form>
	</div>
</body>

</html>
