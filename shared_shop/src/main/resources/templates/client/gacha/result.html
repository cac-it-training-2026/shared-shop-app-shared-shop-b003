<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{gacha.result.title} + ' | ' + #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body class="user gacha_result">
	<h2 th:class="title" th:text="#{gacha.result.title}"></h2>
	<div class="result_area" style="text-align: center; margin-top: 50px;">
		<div th:if="${coupon != null}">
			<h3 th:text="#{gacha.win.message}"></h3>
			<div class="coupon_display" style="border: 3px dashed #ff4500; padding: 20px; display: inline-block; margin: 20px 0; background-color: #fffaf0;">
				<p style="font-size: 24px; font-weight: bold; color: #ff4500;" th:text="${coupon.code}"></p>
				<p th:switch="${coupon.discountType}">
					<span th:case="'amount'" th:text="${coupon.discountValue} + '円引き'"></span>
					<span th:case="'percent'" th:text="${coupon.discountValue} + '%引き'"></span>
				</p>
			</div>
			<p th:text="#{gacha.coupon.instruction}"></p>
		</div>
		<div th:if="${coupon == null}">
			<p th:text="${message}"></p>
		</div>
		<div style="margin-top: 30px;">
			<a th:href="@{/}" th:text="#{gacha.back.to.top}" style="text-decoration: none; color: #007bff; font-weight: bold;"></a>
		</div>
	</div>
</body>

</html>
