<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">
<head>
    <title>テーマ設定 | シェアードショップ</title>
    <meta charset="UTF-8" />
</head>
<body class="user theme_list">
    <h2 class="title">着せ替え設定</h2>

    <div class="user_stats">
        <p>現在の実績: 購入回数 <span th:text="${user.purchaseCount}"></span> 回 / 累計金額 <span th:text="${user.totalPurchaseAmount}"></span> 円</p>
    </div>

    <div class="item_list">
        <table class="list_table">
            <thead>
                <tr>
                    <th>テーマ名</th>
                    <th>解放条件</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>通常テーマ</td>
                    <td>初期状態</td>
                    <td>
                        <a th:if="${user.themeId != 0}" th:href="@{/client/theme/change/0}">変更する</a>
                        <span th:if="${user.themeId == 0}">選択中</span>
                    </td>
                </tr>
                <tr>
                    <td>さくらテーマ</td>
                    <td>購入回数1回以上</td>
                    <td>
                        <a th:if="${user.purchaseCount >= 1 and user.themeId != 1}" th:href="@{/client/theme/change/1}">変更する</a>
                        <span th:if="${user.themeId == 1}">選択中</span>
                        <span th:if="${user.purchaseCount < 1}">未解放</span>
                    </td>
                </tr>
                <tr>
                    <td>海テーマ</td>
                    <td>購入回数3回以上</td>
                    <td>
                        <a th:if="${user.purchaseCount >= 3 and user.themeId != 2}" th:href="@{/client/theme/change/2}">変更する</a>
                        <span th:if="${user.themeId == 2}">選択中</span>
                        <span th:if="${user.purchaseCount < 3}">未解放</span>
                    </td>
                </tr>
                <tr>
                    <td>ゲームテーマ</td>
                    <td>購入回数5回以上</td>
                    <td>
                        <a th:if="${user.purchaseCount >= 5 and user.themeId != 3}" th:href="@{/client/theme/change/3}">変更する</a>
                        <span th:if="${user.themeId == 3}">選択中</span>
                        <span th:if="${user.purchaseCount < 5}">未解放</span>
                    </td>
                </tr>
                <tr>
                    <td>宇宙テーマ</td>
                    <td>累計購入金額10,000円以上</td>
                    <td>
                        <a th:if="${user.totalPurchaseAmount >= 10000 and user.themeId != 4}" th:href="@{/client/theme/change/4}">変更する</a>
                        <span th:if="${user.themeId == 4}">選択中</span>
                        <span th:if="${user.totalPurchaseAmount < 10000}">未解放</span>
                    </td>
                </tr>
                <tr>
                    <td>ゴールドテーマ</td>
                    <td>購入回数10回以上</td>
                    <td>
                        <a th:if="${user.purchaseCount >= 10 and user.themeId != 5}" th:href="@{/client/theme/change/5}">変更する</a>
                        <span th:if="${user.themeId == 5}">選択中</span>
                        <span th:if="${user.purchaseCount < 10}">未解放</span>
                    </td>
                </tr>
                <tr>
                    <td>P3techテーマ</td>
                    <td>購入回数20回以上</td>
                    <td>
                        <a th:if="${user.purchaseCount >= 20 and user.themeId != 6}" th:href="@{/client/theme/change/6}">変更する</a>
                        <span th:if="${user.themeId == 6}">選択中</span>
                        <span th:if="${user.purchaseCount < 20}">未解放</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="back_link">
        <a th:href="@{/}" th:text="#{msg.back.to.top}"></a>
    </div>
</body>
</html>
