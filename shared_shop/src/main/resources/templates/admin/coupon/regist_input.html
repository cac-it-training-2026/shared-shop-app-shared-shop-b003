<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_3block :: layout(~{::title},~{::body/content()})}">

<head>
	<meta charset="UTF-8" />
	<title>クーポン登録 | シェアードショップ</title>
</head>

<body class="admin coupon_regist">
	<h2 class="title">クーポン登録</h2>
	<div class="user_info_form_area">
		<p th:if="${error != null}" style="color: red;" th:text="${error}"></p>
		<form th:action="@{/admin/coupon/regist/complete}" method="post" th:object="${coupon}">
			<table class="detail_table">
				<tr>
					<th>クーポンコード</th>
					<td><input type="text" th:field="*{code}" required /></td>
				</tr>
				<tr>
					<th>割引タイプ</th>
					<td>
						<select th:field="*{discountType}">
							<option value="amount">定額 (円)</option>
							<option value="percent">定率 (%)</option>
						</select>
					</td>
				</tr>
				<tr>
					<th>割引値</th>
					<td><input type="number" th:field="*{discountValue}" required /></td>
				</tr>
				<tr>
					<th>有効期限(開始)</th>
					<td><input type="datetime-local" name="validFromStr" /></td>
				</tr>
				<tr>
					<th>有効期限(終了)</th>
					<td><input type="datetime-local" name="validUntilStr" /></td>
				</tr>
				<tr>
					<th>使用上限</th>
					<td><input type="number" th:field="*{usageLimit}" /></td>
				</tr>
			</table>
			<div class="button_area">
				<input type="submit" value="登録" />
			</div>
		</form>
	</div>
</body>

</html>
