<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">
<head>
<title th:text="#{top}+' | '+ #{shop.title}"> </title>
<meta charset="UTF-8" />
</head>
<body class="user index">

	<!-- ガチャ機能エリア (ログインユーザーのみ) -->
	<div th:if="${session.user != null}" style="border: 2px solid #ff9900; background-color: #fffaf0; padding: 15px; margin-bottom: 20px; border-radius: 5px; text-align: center;">
		<h3 style="margin-top: 0; color: #ff6600;">ログインボーナスガチャ</h3>
		<p style="font-size: 0.9em; margin-bottom: 10px;">1日1回（デモ用）ガチャを回して割引クーポンをGETしよう！</p>

		<form th:action="@{/client/gacha/play}" method="post">
			<input type="submit" value="ガチャを回す！" class="send_button" style="background-color: #ff9900; width: auto; padding: 10px 20px; font-weight: bold;" />
		</form>

		<div th:if="${session.gachaResult != null}" style="margin-top: 15px; padding: 10px; background-color: #ffe4e1; color: #d2691e; border: 1px dashed #d2691e;">
			<strong>ガチャ結果: </strong> <span th:text="${session.gachaResult}"></span>
			<!-- 結果表示後、セッションから削除するための簡単なスクリプト (今回はリロード時に消える想定でバックエンド処理追加推奨) -->
		</div>
	</div>

	<div>
		<h2 class="title">
				<span th:if="${sortType==1}" th:text="#{sort.latest.title}"></span>
				<span th:if="${sortType==2 || sortType==null}" th:text="#{sort.hotsell.title}"></span>
		</h2>
	</div>
	<div th:if="${#lists.isEmpty(items)}">
		<p th:text="#{msg.client.item.list.none}"></p>
	</div>
	<div class="item_list">
		<th:block th:each="item, status: ${items}" th:if="${status.count le 10}">
			<!--/* 1件分の商品情報 */-->
			<div class="item">
				<div class="item_name" th:text="${item.name}"></div>
				<a th:href="@{/client/item/detail/}+${item.id}">
					<img th:src="@{/images/{image}(image=${item.image})}" th:if="${item.image != null}" />
					<img th:src="@{/images/common/no_image.jpg}" th:if="${item.image == null}" />
				</a>
			</div>
		</th:block>
	</div>
</body>
</html>
