<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">
<head>
<title th:text="#{top}+' | '+ #{shop.title}"> </title>
<meta charset="UTF-8" />
</head>
<body class="user index">
	<!--/* タイムセール表示エリア */-->
	<div th:if="${not #maps.isEmpty(activeSales)}" class="time-sale-area">
		<h2 class="title sale-title">開催中のタイムセール</h2>
		<div class="sale-items">
			<div th:each="entry : ${activeSales}" class="sale-category-card">
				<div class="sale-category-name" th:text="${entry.value.category.name}"></div>
				<div class="sale-discount-rate" th:text="${entry.value.discountRate} + '% OFF'"></div>
				<div class="sale-duration">
					[[${entry.value.startTime}]] 〜 [[${entry.value.endTime}]]
					<div class="sale-remaining">あと [[${@saleService.getRemainingTime(entry.value)}]]</div>
				</div>
			</div>
		</div>
		<div class="sale-link-container">
			<a th:href="@{/sale}" class="btn-sale">［セール商品を見る］</a>
		</div>
	</div>

	<div>
		<h2 class="title">
				<span th:if="${sortType==1}" th:text="#{sort.latest.title}"></span>
				<span th:if="${sortType==2 || sortType==null}" th:text="#{sort.hotsell.title}"></span>
		</h2>
	</div>
	<div th:if="${#lists.isEmpty(items)}">
		<p th:text="#{msg.client.item.list.none}"></p>
	</div>
	<div class="item_list">
	<th:block th:each="item, status: ${items}" th:if="${status.count le 10}">
		<!--/* 1件分の商品情報 */-->
		<div class="item">
			<div class="item_name" th:text="${item.name}"></div>
			<a th:href="@{/client/item/detail/}+${item.id}">
			    <img th:src="@{/images/{image}(image=${item.image})}" th:if="${item.image != null}" />
			    <img th:src="@{/images/common/no_image.jpg}" th:if="${item.image == null}" />
			</a>
		</div>
	</div>
	</th:block>
</body>
</html>
